services:
  - type: web
    name: n8n
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest

    plan: free

    envVars:
      - key: N8N_HOST
        value: cont-start.onrender.com

      - key: N8N_PORT
        value: "5678"

      - key: N8N_PROTOCOL
        value: https

      - key: WEBHOOK_URL
        value: https://cont-start.onrender.com/

      - key: N8N_EDITOR_BASE_URL
        value: https://cont-start.onrender.com

      - key: N8N_ENCRYPTION_KEY
        generateValue: true

    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
