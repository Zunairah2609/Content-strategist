services:
  - type: web
    name: n8n
    runtime: image
    repo: https://github.com/n8n-io/n8n
    plan: free
    envVars:
      - key: N8N_HOST
        value: content-start.onrender.com #change 'your-app-name'
      - key: N8N_PORT
        value: '5678'
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://content-start.onrender.com/ #change 'your-app-name'
      - key: 7f4c9e2d8b1a6f3e5c7d9a2b4e8f1c6d3b5a7e9f2c4d6b8a1e3f5c7d9a2b4e6f #(Generate a unique key for security)
        generateValue: true
    dockerCommand: n8n start
    numReplicas: 1